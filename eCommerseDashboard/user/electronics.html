<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopZone – Electronics</title>
  <link rel="stylesheet" href="../css/user.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">🛍️ ShopZone</a>
    <div class="navbar-search">
      <input type="text" id="search-input" placeholder="Search products…" />
    </div>
    <ul class="navbar-menu" id="navbar-menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="electronics.html" class="active">Electronics</a></li>
      <li>
        <a href="cart.html" class="cart-link">
          🛒 Cart
          <span class="cart-badge" id="cart-badge" style="display:none">0</span>
        </a>
      </li>
      <li><a href="myorders.html">My Orders</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><span id="nav-username" style="color:rgba(255,255,255,0.7);padding:8px 6px;font-size:0.88rem"></span></li>
      <li><a href="#" onclick="logoutUser()" style="color:#ffcdd2">Logout</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <!-- HERO BANNER -->
  <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;padding:50px 30px;text-align:center">
    <div style="font-size:3rem;margin-bottom:12px">⚡</div>
    <h1 style="font-size:2.2rem;font-weight:800;margin-bottom:10px">Electronics</h1>
    <p style="opacity:0.8;font-size:1rem">The latest gadgets and tech at great prices</p>
  </div>

  <div class="section">
    <div class="filter-bar">
      <input type="text" id="filter-search" placeholder="🔍 Search electronics…" />
      <select id="filter-sort">
        <option value="">Sort By</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="name-asc">Name: A → Z</option>
      </select>
      <select id="filter-price">
        <option value="">All Prices</option>
        <option value="0-50">Under $50</option>
        <option value="50-200">$50 – $200</option>
        <option value="200-1000">$200+</option>
      </select>
    </div>

    <div id="product-grid" class="product-grid">
      <div class="loading"><div class="spinner"></div><p>Loading electronics…</p></div>
    </div>
  </div>

  <script src="../js/store.js"></script>
  <script>
    const _u = JSON.parse(localStorage.getItem('sz_current_user') || 'null');
    if (!_u) { window.location.href = '../index.html'; }
    else { const el = document.getElementById('nav-username'); if(el) el.textContent = '👤 ' + _u.name; }
    function logoutUser() { localStorage.removeItem('sz_current_user'); window.location.href = '../index.html'; }

    Store.updateCartBadge();

    let allProducts = [];

    async function loadElectronics() {
      try {
        const res = await fetch('https://fakestoreapi.com/products/category/electronics');
        const apiProducts = await res.json();
        // Also include admin products tagged as electronics
        const adminProducts = Store.getAdminProducts().filter(p => p.category === 'electronics');
        allProducts = [...adminProducts, ...apiProducts];
        applyFilters();
      } catch (e) {
        document.getElementById('product-grid').innerHTML = '<p style="color:#888">Failed to load products.</p>';
      }
    }

    function applyFilters() {
      let products = [...allProducts];
      const search = document.getElementById('filter-search').value.toLowerCase();
      const sort = document.getElementById('filter-sort').value;
      const price = document.getElementById('filter-price').value;

      if (search) products = products.filter(p => p.title.toLowerCase().includes(search));
      if (price) {
        const [min, max] = price.split('-').map(Number);
        products = products.filter(p => p.price >= min && p.price <= max);
      }
      if (sort === 'price-asc') products.sort((a, b) => a.price - b.price);
      else if (sort === 'price-desc') products.sort((a, b) => b.price - a.price);
      else if (sort === 'name-asc') products.sort((a, b) => a.title.localeCompare(b.title));

      const grid = document.getElementById('product-grid');
      grid.innerHTML = '';
      if (products.length === 0) {
        grid.innerHTML = '<p style="color:#888;grid-column:1/-1">No electronics found.</p>';
        return;
      }
      products.forEach(p => grid.appendChild(buildProductCard(p)));
    }

    document.getElementById('filter-search').addEventListener('input', applyFilters);
    document.getElementById('filter-sort').addEventListener('change', applyFilters);
    document.getElementById('filter-price').addEventListener('change', applyFilters);
    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        document.getElementById('filter-search').value = e.target.value;
        applyFilters();
      }
    });

    loadElectronics();
  </script>
</body>
</html>
