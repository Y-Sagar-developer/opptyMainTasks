<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>ShopZone – Products</title>
  <link rel="stylesheet" href="../css/user.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">🛍️ ShopZone</a>
    <div class="navbar-search">
      <input type="text" id="search-input" placeholder="Search products…" />
    </div>
    <ul class="navbar-menu" id="navbar-menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html" class="active">Products</a></li>
      <li><a href="electronics.html">Electronics</a></li>
      <li>
        <a href="cart.html" class="cart-link">
          🛒 Cart
          <span class="cart-badge" id="cart-badge" style="display:none">0</span>
        </a>
      </li>
      <li><a href="myorders.html">My Orders</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><span id="nav-username" style="color:rgba(255,255,255,0.7);padding:8px 6px;font-size:0.88rem"></span></li>
      <li><a href="#" onclick="logoutUser()" style="color:#ffcdd2">Logout</a></li>
    </ul>

  </nav>

  <div class="section">
    <h2 class="section-title">All Products</h2>
    <p class="section-subtitle">Browse our full collection</p>

    <div id="product-grid" class="product-grid">
      <div class="loading"><div class="spinner"></div><p>Loading products…</p></div>
    </div>
  </div>

  <script src="../js/store.js"></script>
  <script>
    const _u = JSON.parse(localStorage.getItem('sz_current_user') || 'null');
    if (!_u) { window.location.href = '../index.html'; }
    else { const el = document.getElementById('nav-username'); if(el) el.textContent = '👤 ' + _u.name; }
    function logoutUser() { localStorage.removeItem('sz_current_user'); window.location.href = '../index.html'; }

    Store.updateCartBadge();

    async function loadProducts() {
      try {
        const res = await fetch('https://fakestoreapi.com/products');
        const apiProducts = await res.json();
        const adminProducts = Store.getAdminProducts();
        const allProducts = [...adminProducts, ...apiProducts];
        
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        allProducts.forEach(p => grid.appendChild(buildProductCard(p)));
      } catch (e) {
        document.getElementById('product-grid').innerHTML = '<p style="color:#888">Failed to load products.</p>';
      }
    }

    loadProducts();
  </script>
</body>
</html>
